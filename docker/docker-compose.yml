networks:
  m4st:
    driver: bridge
  m4st-internal:
    driver: bridge
    internal: true

volumes:
  falkordb_data:
  langfuse_postgres:
  langfuse_clickhouse:
  uptime_kuma_data:
  librechat_mongodb:
  librechat_meilisearch:
  perplexica_data:

x-env-file: &default-env
  - path: ../.env
    required: false

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    mem_limit: 600m
    networks: [m4st]
    ports: ["127.0.0.1:3001:3001"]
    env_file: *default-env
    volumes:
      - ../logs:/app/logs
      - ../drafts:/app/drafts

  ninerouter:
    image: decolua/9router:latest
    restart: unless-stopped
    mem_limit: 300m
    networks: [m4st]
    ports:
      - "127.0.0.1:20128:20128"
      - "127.0.0.1:20129:20129"

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    mem_limit: 1200m
    networks: [m4st-internal]
    volumes:
      - falkordb_data:/data

  graphiti-mcp:
    image: chen9z/graphiti_mcp_server:latest
    restart: unless-stopped
    mem_limit: 500m
    networks: [m4st, m4st-internal]
    ports: ["127.0.0.1:8001:8000"]
    environment:
      FALKORDB_URI: bolt://falkordb:6379
      OPENAI_API_KEY: ${NINEROUTER_API_KEY:-}
      OPENAI_BASE_URL: ${NINEROUTER_BASE_URL:-http://ninerouter:20128/v1}
      MODEL: ${MODEL_FAST:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on: [falkordb]

  cognee-mcp:
    image: cognee/cognee-mcp:main
    restart: unless-stopped
    mem_limit: 600m
    networks: [m4st]
    ports: ["127.0.0.1:8000:8000"]
    env_file: *default-env

  langfuse-db:
    image: postgres:15-alpine
    restart: unless-stopped
    mem_limit: 300m
    networks: [m4st-internal]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:-langfuse-local-only}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres:/var/lib/postgresql/data

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    mem_limit: 400m
    networks: [m4st-internal]
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse-local-only}
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - langfuse_clickhouse:/var/lib/clickhouse

  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    mem_limit: 700m
    networks: [m4st, m4st-internal]
    ports: ["127.0.0.1:3000:3000"]
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:-langfuse-local-only}@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse-local-only}@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse-local-only}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on: [langfuse-db, langfuse-clickhouse]

  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    mem_limit: 250m
    networks: [m4st]
    ports: ["127.0.0.1:3002:3001"]
    volumes:
      - uptime_kuma_data:/app/data

  openwork-mcp:
    build:
      context: ..
      dockerfile: openwork-mcp/Dockerfile
    restart: unless-stopped
    mem_limit: 500m
    networks: [m4st, m4st-internal]
    ports: ["127.0.0.1:8765:8765"]
    env_file: *default-env
    environment:
      M4ST_TOKEN: ${M4ST_TOKEN:-}
      M4ST_ADMIN_TOKENS: ${M4ST_ADMIN_TOKENS:-}
      M4ST_READ_TOKENS: ${M4ST_READ_TOKENS:-}
    volumes:
      - ../logs:/app/logs
      - ../drafts:/app/drafts
      - ../reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on: [openclaw, graphiti-mcp, cognee-mcp]

  perplexica:
    image: itzcrazykns1337/vane:latest
    restart: unless-stopped
    mem_limit: 500m
    networks: [m4st]
    ports: ["127.0.0.1:3010:3000"]
    volumes:
      - perplexica_data:/home/vane/data
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

  librechat-mongodb:
    image: mongo:7
    restart: unless-stopped
    mem_limit: 300m
    networks: [m4st-internal]
    volumes:
      - librechat_mongodb:/data/db

  librechat-meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    mem_limit: 150m
    networks: [m4st-internal]
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
    volumes:
      - librechat_meilisearch:/meili_data

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    restart: unless-stopped
    mem_limit: 400m
    networks: [m4st, m4st-internal]
    ports: ["127.0.0.1:3080:3080"]
    environment:
      HOST: 0.0.0.0
      MONGO_URI: mongodb://librechat-mongodb:27017/LibreChat
      MEILI_HOST: http://librechat-meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-}
      ENDPOINTS: openAI,custom
      OPENAI_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_REVERSE_PROXY: http://ninerouter:20128/v1
      SEARCH: "true"
      NO_INDEX: "true"
    depends_on: [librechat-mongodb, librechat-meilisearch, ninerouter]
